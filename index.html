<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><script src='https://cdn.tailwindcss.com'></script><title>Cremería de SAM</title></head><body class='bg-sky-50'><div class='max-w-4xl mx-auto p-4'><div class='bg-white p-5 rounded-2xl shadow'><div class="flex justify-center mb-4">
    <img
        src="https://soptheia.github.io/desam/logo.png"
        alt="Cremería de SAM"
        class="h-28 object-contain">
</div><h1 class='text-3xl font-bold text-sky-700 mt-4'>Nuevo Pedido</h1><input id='buscar' class='border p-3 w-full rounded-xl mt-4' placeholder='Buscar'><div id='productos' class='grid gap-2 mt-4'></div><h2 class='font-bold mt-6'>Cliente</h2><input id='nombre' class='border p-2 w-full rounded mt-2' placeholder='Nombre'><input id='direccion' class='border p-2 w-full rounded mt-2' placeholder='Dirección'><input id='telefono' class='border p-2 w-full rounded mt-2' placeholder='Teléfono'><div id='resumen' class='mt-4'></div><div class='text-right text-2xl font-bold'>Total: $<span id='total'>0.00</span></div><div class='grid grid-cols-2 gap-3 mt-4'><button onclick='limpiar()' class='bg-gray-300 p-3 rounded-xl'>Limpiar</button><button onclick='enviar()' class='bg-green-500 text-white p-3 rounded-xl'>WhatsApp</button></div></div></div><script>
const GOOGLE_SHEET_JSON_URL="PEGAR_URL_JSON";
let productos=[{"name": "Queso Panela 1kg", "price": 95.0}, {"name": "Queso Oaxaca 1kg", "price": 110.0}, {"name": "Queso Manchego 1kg", "price": 165.0}, {"name": "Crema Acida 1L", "price": 65.0}, {"name": "Mantequilla 250g", "price": 48.0}, {"name": "Yogurt Natural 1L", "price": 55.0}, {"name": "Jamon de Pavo 1kg", "price": 130.0}, {"name": "Salchicha Viena 1kg", "price": 85.0}, {"name": "Chorizo Rojo 1kg", "price": 120.0}, {"name": "Tocino 500g", "price": 75.0}, {"name": "Requeson 500g", "price": 45.0}, {"name": "Queso Crema 190g", "price": 38.0}, {"name": "Leche Entera 1L", "price": 28.0}, {"name": "Huevo Blanco 30pz", "price": 78.0}, {"name": "Jamon de Pierna 1kg", "price": 145.0}];
let carrito=[];
function render(f=""){let c=document.getElementById('productos');c.innerHTML='';productos.filter(x=>x.name.toLowerCase().includes(f.toLowerCase())).forEach((p,idx)=>{c.innerHTML+=`<div class="border rounded-xl p-3 flex justify-between"><div><b>${p.name}</b><br>$${p.price.toFixed(2)}</div><button class="bg-sky-600 text-white px-3 rounded" onclick="add(${idx})">Agregar</button></div>`;});}
function add(i){let e=carrito.find(x=>x.name==productos[i].name);if(e)e.qty++;else carrito.push({...productos[i],qty:1});draw();}
function draw(){let r=document.getElementById('resumen');let t=0;r.innerHTML='';carrito.forEach(x=>{t+=x.qty*x.price;r.innerHTML+=`<div>${x.qty} x ${x.name} = $${(x.qty*x.price).toFixed(2)}</div>`});document.getElementById('total').textContent=t.toFixed(2);}
buscar.oninput=e=>render(e.target.value);
function limpiar(){carrito=[];draw();nombre.value='';direccion.value='';telefono.value='';}
function enviar(){if(!carrito.length){alert('Sin productos');return;}let m='*Pedido Cremería de SAM*%0A';m+='Cliente: '+nombre.value+'%0ADirección: '+direccion.value+'%0ATeléfono: '+telefono.value+'%0A%0A';let t=0;carrito.forEach(x=>{m+=x.qty+' x '+x.name+' - $'+(x.qty*x.price).toFixed(2)+'%0A';t+=x.qty*x.price;});m+='%0ATotal: $'+t.toFixed(2);window.open('https://wa.me/523314596000?text='+m,'_blank');limpiar();}
render();
</script></body></html>
